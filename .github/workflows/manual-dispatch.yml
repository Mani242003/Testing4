name: Manual Dispatch Example

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

      message:
        description: "Enter a message"
        required: true
        default: "Hello World"
        type: string

jobs:
  demo-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print selected environment
        run: echo "Environment = ${{ github.event.inputs.environment }}"

      - name: Print user message
        run: echo "Message = ${{ github.event.inputs.message }}"

      - name: Final step
        run: echo "✅ Workflow completed successfully"
